<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLORFLY STUDIO | PALETTE Arcade</title>
    <link rel="icon" type="image/x-icon" href="./other-imgs/favicon.ico">
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="arcade-cabinet">
        <header>
            <h1 class="glitch" data-text="COLORFLY">COLORFLY Studio</h1>
            <h2 class="studio-text">Color Palette Generator</h2>
            <div class="high-score">HIGH SCORE: 08042026</div>
        </header>

        <div class="panel">
            <div class="setting">
                <span>SLOTS:</span>
                <select id="card-count">
                    <option value="6">06</option>
                    <option value="8">08</option>
                    <option value="9">09</option>
                </select>
            </div>
            
            <div class="setting">
                <span>FORMAT:</span>
                <button id="format-toggle" class="mini-btn">HEX</button>
            </div>
        </div>

        <div id="palette-grid" class="grid-6"></div>

        <div class="action-zone">
            <button id="generate-btn">PUSH START [SPACE]</button>
            <p class="blink">CLICK CARD TO COPY DATA</p>
        </div>
    </div>
    <footer>
    <a href="https://github.com/alfinaltodoeslomismo/ProyectoM1_JorgeMora" 
  class="bottom-button"
   target="_blank" 
   rel="noopener noreferrer">
   If you like this page visit our GitHub page
   </a>
    <script src="./js/script.js"></script>
  </footer>

</body>
</html>
