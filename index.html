<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorfly Studio - Arcade Palette Gen</title>
    <link rel="stylesheet" href="./css/styles.css">
    <!-- Retro Pixel Font -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body class="arcade-bg">
    <div class="game-container">
        <header>
            <h1 class="pixel-text color-flicker">COLORFLY STUDIO</h1>
            <p class="subtitle">INSERT COIN TO GENERATE</p>
        </header>

        <div class="controls-panel">
            <div class="control-group">
                <label>CARDS:</label>
                <select id="card-count" class="retro-select">
                    <option value="6">6</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>FORMAT:</label>
                <div class="toggle-container" id="format-toggle">
                    <span class="toggle-label active" data-format="HEX">HEX</span>
                    <div class="toggle-switch"></div>
                    <span class="toggle-label" data-format="HSL">HSL</span>
                </div>
            </div>

            <button id="generate-btn" class="retro-btn">GENERATE!</button>
        </div>

        <div id="palette-grid" class="grid-6">
            <!-- Cards will be injected here by JS -->
        </div>

        <div id="toast" class="pixel-toast">COPIED!</div>
    </div>
    <script src="./js/script.js"></script>
</body>
</html>
