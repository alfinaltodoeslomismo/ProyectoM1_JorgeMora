<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibePalette // Modern Generator</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="hex-mode">

    <header>
        <div class="logo">Vibe<span>Palette</span></div>
        <div class="controls">
            <select id="card-count">
                <option value="6">6 Colors</option>
                <option value="8">8 Colors</option>
                <option value="9">9 Colors</option>
            </select>
            
            <button id="toggle-format" class="secondary-btn">HEX ⇄ HSL</button>
            <button id="gen-btn" class="primary-btn">GENERATE [Space]</button>
        </div>
    </header>

    <main id="palette-container"></main>

    <div id="copy-toast">Copied to clipboard! ✨</div>

    <script src="./js/script.js"></script>
</body>
</html>
