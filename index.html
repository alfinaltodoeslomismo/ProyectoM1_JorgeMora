<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Palette Generator</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <h1>Colorfly Studio</h1>
<br>
    <div class="controls">
        <button id="generate-btn">Generate New Palette</button>
        <br>
        <div class="switch-container">
            <span>HEX</span>
            <label class="switch">
                <input type="checkbox" id="format-switch">
                <span class="slider"></span>
            </label>
            <span>HSL</span>
        </div>
    </div>
    
<br>
    <div id="palette-container" class="palette-grid">
        <!-- Color cards will be generated by JS here -->
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
